<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLS Gateway — RMD 2026</title>
  <link rel="stylesheet" href="css/rmd.css">
  <style>
    * { box-sizing: border-box; }
    body { background: #f0f3f6; font-family: var(--font); margin: 0; padding: 0 0 80px; }

    /* ── Top bar ── */
    .top-bar {
      background: var(--rmd-navy); color: white; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 200;
    }
    .top-bar img { height: 28px; }
    .top-bar-title { font-size: 15px; font-weight: 700; flex: 1; }
    .clock-pill {
      font-size: 13px; font-weight: 700;
      background: rgba(255,255,255,0.15); border-radius: 20px;
      padding: 4px 12px; min-width: 70px; text-align: center;
    }

    /* ── Deadline bar ── */
    #deadlineBar {
      padding: 8px 16px; text-align: center; font-size: 13px; font-weight: 700;
      background: #1a3a5c; color: white; transition: background 0.5s;
    }
    #deadlineBar.amber { background: #e65c00; }
    #deadlineBar.red   { background: #b71c1c; }

    /* ── View switcher ── */
    .view-tabs {
      display: flex; background: white; border-bottom: 2px solid #dce3ea;
      overflow-x: auto;
    }
    .view-tab {
      padding: 11px 18px; font-size: 13px; font-weight: 700;
      color: var(--rmd-muted); border: none; background: none;
      font-family: var(--font); cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap;
    }
    .view-tab:hover  { color: var(--rmd-blue); }
    .view-tab.active { color: var(--rmd-blue); border-bottom-color: var(--rmd-blue); }

    /* ── Room selector (director only) ── */
    #roomSelector {
      padding: 10px 14px; display: flex; gap: 8px; flex-wrap: wrap;
      background: #f8f9fb; border-bottom: 1px solid #dce3ea;
    }
    .room-btn {
      padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
      font-family: var(--font); cursor: pointer;
      background: white; color: var(--rmd-navy); border: 2px solid #ccd6dd;
      transition: all 0.12s;
    }
    .room-btn:hover { border-color: var(--rmd-blue); color: var(--rmd-blue); }
    .room-btn.active { background: var(--rmd-navy); color: white; border-color: var(--rmd-navy); }
    .room-btn.done   { background: #e6f4ea; border-color: #34a853; color: #1a6e31; }

    /* ── Content ── */
    .content { padding: 14px; max-width: 800px; margin: 0 auto; }

    /* ── Room header ── */
    .room-header {
      background: var(--rmd-navy); color: white; border-radius: 10px;
      padding: 14px 18px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
    }
    .room-header .room-name { font-size: 20px; font-weight: 700; flex: 1; }
    .room-header .room-prog { font-size: 13px; opacity: 0.8; }

    /* ── Candidate rows ── */
    .candidate-row {
      background: white; border-radius: 10px; margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10); overflow: hidden;
      display: flex; align-items: center; gap: 0; min-height: 64px;
      border: 2px solid transparent; transition: border-color 0.15s;
    }
    .candidate-row.outcome-pass { border-color: #34a853; }
    .candidate-row.outcome-fail { border-color: #ea4335; }

    .cr-name {
      flex: 1; padding: 12px 14px; font-size: 15px; font-weight: 700;
      color: var(--rmd-navy); min-width: 0;
    }
    .cr-name small { display: block; font-size: 11px; font-weight: 600; color: var(--rmd-muted); margin-top: 2px; }

    .cr-outcome {
      display: flex; align-items: center; gap: 6px; padding: 10px;
      flex-shrink: 0;
    }
    .btn-pass, .btn-fail {
      font-size: 22px; width: 52px; height: 52px; border: 3px solid transparent;
      border-radius: 50%; cursor: pointer; font-family: var(--font);
      background: #f0f3f6; transition: all 0.12s; display: flex;
      align-items: center; justify-content: center;
    }
    .btn-pass:hover { background: #e6f4ea; border-color: #34a853; transform: scale(1.08); }
    .btn-fail:hover { background: #fce8e6; border-color: #ea4335; transform: scale(1.08); }
    .btn-pass.selected { background: #34a853; border-color: #2e7d32; color: white; }
    .btn-fail.selected { background: #ea4335; border-color: #c62828; color: white; }

    .cr-flag {
      font-size: 22px; width: 44px; height: 52px; border: none;
      background: none; cursor: pointer; opacity: 0.3; transition: opacity 0.12s;
      flex-shrink: 0;
    }
    .cr-flag:hover  { opacity: 0.7; }
    .cr-flag.flagged { opacity: 1; }

    .cr-lock {
      font-size: 20px; width: 44px; height: 52px; border: none;
      background: none; cursor: pointer; color: #aab8c2; flex-shrink: 0;
      transition: color 0.12s;
    }
    .cr-lock.locked { color: var(--rmd-navy); cursor: pointer; }
    .cr-lock.unlock-pending { color: #e65c00; }

    .cr-status {
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px;
      margin-right: 8px; flex-shrink: 0;
    }
    .status-pass { background: #e6f4ea; color: #1a6e31; }
    .status-fail { background: #fce8e6; color: #b7410e; }
    .status-pending { background: #f0f3f6; color: #aab8c2; }

    /* ── Concerns panel ── */
    #concernsPanel {
      background: #fff8e1; border: 2px solid #fbc02d; border-radius: 10px;
      padding: 14px; margin-bottom: 14px; display: none;
    }
    #concernsPanel h3 { margin: 0 0 10px; font-size: 14px; color: #b71c1c; }
    #concernsPanel .concern-item { font-size: 13px; color: var(--rmd-navy); margin-bottom: 4px; }

    /* ── Overview (director) ── */
    .overview-banner {
      border-radius: 10px; padding: 16px 20px; margin-bottom: 16px;
      text-align: center; font-size: 18px; font-weight: 700;
    }
    .banner-ok    { background: #e6f4ea; color: #1a6e31; }
    .banner-alert { background: #fce8e6; color: #b71c1c; }
    .banner-wait  { background: #f5f7fa; color: #637282; }

    .overview-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px;
      margin-bottom: 20px;
    }
    .ov-room-card {
      background: white; border-radius: 10px; padding: 12px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.12s;
    }
    .ov-room-card:hover    { border-color: var(--rmd-blue); }
    .ov-room-card .rn     { font-size: 16px; font-weight: 700; color: var(--rmd-navy); }
    .ov-room-card .rp     { font-size: 12px; color: var(--rmd-muted); margin: 4px 0; }
    .progress-bar-wrap    { background: #f0f3f6; border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar-fill    { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .fill-complete { background: #34a853; }
    .fill-partial  { background: #fbbc04; }
    .fill-empty    { background: #f0f3f6; }
    .ov-room-flag  { font-size: 11px; color: #b71c1c; font-weight: 700; margin-top: 6px; }

    .concerns-list { background: white; border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .concerns-list h3 { margin: 0 0 10px; font-size: 14px; color: var(--rmd-navy); }
    .cl-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f3f6; }
    .cl-item:last-child { border-bottom: none; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 24px; font-size: 14px; font-weight: 700;
      color: white; z-index: 999; opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    }
    #toast.show  { opacity: 1; }
    #toast.green { background: #34a853; }
    #toast.amber { background: #e65c00; }
    #toast.red   { background: #ea4335; }

    .loading-state { text-align: center; padding: 60px 20px; color: var(--rmd-muted); }
    .empty-state   { text-align: center; padding: 40px 20px; color: var(--rmd-muted); font-size: 14px; }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="timetable.html" style="display:flex;align-items:center;">
    <img src="assets/rmd-logo.png" alt="RMD">
  </a>
  <div class="top-bar-title">BLS Gateway Assessment</div>
  <div class="clock-pill" id="clockEl">–:–</div>
</div>

<div id="deadlineBar">Assessing until 11:45 ·  loading…</div>

<div class="view-tabs" id="viewTabs" style="display:none;">
  <button class="view-tab active" id="tabAssess"   onclick="switchView('assess')">Assess</button>
  <button class="view-tab"        id="tabOverview" onclick="switchView('overview')">Overview</button>
</div>

<div id="roomSelector" style="display:none;"></div>

<div class="content">
  <div class="loading-state" id="loadingEl">Loading…</div>
  <div id="mainContent" style="display:none;"></div>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>

// ── URL params ──────────────────────────────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
const myRole  = (params.get("role")  || "faculty").toLowerCase();
const myRoom  = (params.get("room")  || "").toUpperCase();
const isDirector = myRole === "director";

const DIRECTOR_EMAILS = ["console_brews.6f@icloud.com", "j.hulme.1@bham.ac.uk"];
const DEADLINE_HOUR   = 11;
const DEADLINE_MIN    = 45;

// ── State ───────────────────────────────────────────────────────────────────
var candidates    = {};   // id -> {name, stream}
var assessments   = {};   // id -> {outcome, flagged, lockedAt}
var unlockPending = {};   // id -> true while awaiting confirmation
var currentView   = "assess";
var currentRoom   = myRoom;
var allRooms      = [];
var unsubscribe   = null;

// ── Boot ────────────────────────────────────────────────────────────────────
initFirebase();

auth.onAuthStateChanged(user => {
  if (user) {
    // Director override: verify email
    if (isDirector && !DIRECTOR_EMAILS.includes(user.email.toLowerCase())) {
      checkFirestoreDirector(user.email).then(ok => {
        if (ok) boot(); else showError("Director access required.");
      });
    } else {
      boot();
    }
  } else {
    showError('Please <a href="index.html">sign in</a> to access assessments.');
  }
});

async function checkFirestoreDirector(email) {
  try {
    const snap = await db.collection("config").doc("platform").get();
    const dirs = snap.exists ? (snap.data().directors || []) : [];
    return dirs.map(x => x.toLowerCase()).includes(email.toLowerCase());
  } catch { return false; }
}

function showError(msg) {
  document.getElementById("loadingEl").innerHTML = `<div style="padding:40px;text-align:center;">${msg}</div>`;
}

async function boot() {
  if (isDirector) {
    document.getElementById("viewTabs").style.display = "flex";
  }
  updateClock();
  setInterval(updateClock, 10000);
  await loadCandidates();
  startListener();
}

// ── Load candidates from Firestore or demo data ──────────────────────────────
async function loadCandidates() {
  try {
    const snap = await db.collection(COLLECTIONS.people).get();
    if (snap.empty) { loadDemo(); return; }
    snap.docs.forEach(d => {
      const data = d.data();
      candidates[d.id] = { name: data.name || d.id, stream: data.stream || "" };
    });
    // Derive rooms
    const roomSet = new Set();
    snap.docs.forEach(d => {
      const rm = (d.data().room || "").toUpperCase();
      if (rm) roomSet.add(rm);
    });
    allRooms = Array.from(roomSet).sort();
    if (!currentRoom && allRooms.length) currentRoom = allRooms[0];
  } catch (err) {
    console.warn("Could not load people; falling back to demo data.", err);
    loadDemo();
  }
}

function loadDemo() {
  const demoRooms = ["WF15","WF16","WF17","G06","G07"];
  if (!currentRoom) currentRoom = demoRooms[0];
  allRooms = demoRooms;
  const names = [
    "Alex Patel","Bea Thompson","Chris Owusu","Divya Mehta","Ed Walsh",
    "Fiona Clarke","George Ivanova","Hannah Brown","Isaac Wong","Julia Nakamura"
  ];
  demoRooms.forEach(room => {
    const offset = demoRooms.indexOf(room) * 2;
    for (let i = 0; i < 2; i++) {
      const n = names[(offset + i) % names.length];
      const id = room + "_" + (i + 1);
      candidates[id] = { name: n, stream: "Instructor Candidate", room };
    }
  });
}

// ── Real-time listener ────────────────────────────────────────────────────────
function startListener() {
  if (unsubscribe) unsubscribe();
  unsubscribe = db.collection("gateway_assessments")
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if (change.type === "removed") {
          delete assessments[change.doc.id];
        } else {
          assessments[change.doc.id] = change.doc.data();
        }
      });
      document.getElementById("loadingEl").style.display  = "none";
      document.getElementById("mainContent").style.display = "block";
      render();
    }, err => {
      console.error("Listener error", err);
      document.getElementById("loadingEl").style.display  = "none";
      document.getElementById("mainContent").style.display = "block";
      render();
    });
}

// ── Routing ───────────────────────────────────────────────────────────────────
function render() {
  if (currentView === "overview" && isDirector) {
    buildRoomSelector();
    renderOverview();
  } else {
    if (isDirector) buildRoomSelector();
    renderAssess();
  }
}

function switchView(view) {
  currentView = view;
  document.getElementById("tabAssess").classList.toggle("active",   view === "assess");
  document.getElementById("tabOverview").classList.toggle("active", view === "overview");
  document.getElementById("roomSelector").style.display = (view === "assess" && isDirector) ? "flex" : "none";
  render();
}

function setRoom(room) {
  currentRoom = room;
  renderAssess();
  buildRoomSelector();
}

// ── Room selector ──────────────────────────────────────────────────────────────
function buildRoomSelector() {
  const sel = document.getElementById("roomSelector");
  if (!isDirector) { sel.style.display = "none"; return; }
  if (currentView !== "assess") { sel.style.display = "none"; return; }
  sel.style.display = "flex";
  const roomCandidates = roomsWithProgress();
  sel.innerHTML = roomCandidates.map(r => {
    const done = r.total > 0 && r.recorded === r.total;
    return `<button class="room-btn${r.room===currentRoom?" active":""}${done?" done":""}"
      onclick="setRoom('${r.room}')">${r.room} (${r.recorded}/${r.total})</button>`;
  }).join("");
}

function roomsWithProgress() {
  return allRooms.map(room => {
    const ids = candidateIdsForRoom(room);
    const recorded = ids.filter(id => assessments[id] && assessments[id].outcome).length;
    return { room, total: ids.length, recorded };
  });
}

function candidateIdsForRoom(room) {
  return Object.entries(candidates)
    .filter(([id, c]) => {
      const r = (c.room || id.split("_")[0] || "").toUpperCase();
      return r === room;
    })
    .map(([id]) => id);
}

// ── Render: Assess view ──────────────────────────────────────────────────────
function renderAssess() {
  const ids = candidateIdsForRoom(currentRoom);
  const assessed = ids.filter(id => assessments[id] && assessments[id].outcome).length;
  const flagged  = ids.filter(id => assessments[id] && assessments[id].flagged).length;

  let html = `
    <div class="room-header">
      <div class="room-name">Room ${currentRoom}</div>
      <div class="room-prog">${assessed}/${ids.length} assessed${flagged ? " · ⚑ " + flagged + " concern(s)" : ""}</div>
    </div>`;

  // Concerns panel
  const concerns = ids.filter(id => assessments[id] && assessments[id].flagged);
  if (concerns.length) {
    html += `<div id="concernsPanel" style="display:block;background:#fff8e1;border:2px solid #fbc02d;border-radius:10px;padding:14px;margin-bottom:14px;">
      <h3 style="margin:0 0 10px;font-size:14px;color:#b71c1c;">⚑ Concern flags (${concerns.length})</h3>
      ${concerns.map(id => `<div class="concern-item">⚑ ${candidates[id]?candidates[id].name:id}</div>`).join("")}
    </div>`;
  }

  if (ids.length === 0) {
    html += `<div class="empty-state">No candidates assigned to room ${currentRoom}.</div>`;
  } else {
    html += ids.map(id => buildCandidateRow(id)).join("");
  }

  document.getElementById("mainContent").innerHTML = html;
}

function buildCandidateRow(id) {
  const cand = candidates[id] || { name: id, stream: "" };
  const asmnt = assessments[id] || {};
  const outcome = asmnt.outcome || null;      // "pass" | "fail" | null
  const flagged = asmnt.flagged || false;
  const locked  = !!(asmnt.lockedAt);
  const pending = unlockPending[id] || false;

  const rowClass = outcome === "pass" ? "outcome-pass" : outcome === "fail" ? "outcome-fail" : "";

  const passClass = outcome === "pass" ? "selected" : "";
  const failClass = outcome === "fail" ? "selected" : "";

  const flagClass = flagged ? "flagged" : "";

  let lockIcon = "";
  if (locked && !pending) {
    lockIcon = `<button class="cr-lock locked" onclick="requestUnlock('${id}')" title="Locked — tap to request unlock">🔒</button>`;
  } else if (locked && pending) {
    lockIcon = `<button class="cr-lock unlock-pending" onclick="confirmUnlock('${id}')" title="Tap again to confirm unlock">🔓</button>`;
  } else if (outcome) {
    lockIcon = `<button class="cr-lock" onclick="lockOutcome('${id}')" title="Tap to lock this outcome">🔓</button>`;
  }

  // If locked, disable buttons
  const disabled = (locked && !pending) ? "disabled style='opacity:0.4;cursor:not-allowed;pointer-events:none;'" : "";

  return `
    <div class="candidate-row ${rowClass}" id="cr-${id}">
      <div class="cr-name">
        ${cand.name}
        <small>${cand.stream||""}</small>
      </div>
      <div class="cr-outcome">
        <button class="btn-pass ${passClass}" onclick="recordOutcome('${id}','pass')" ${disabled} title="Successful">✓</button>
        <button class="btn-fail ${failClass}" onclick="recordOutcome('${id}','fail')" ${disabled} title="Not Successful">✗</button>
      </div>
      <button class="cr-flag ${flagClass}" onclick="toggleFlag('${id}')" title="Flag concern">⚑</button>
      ${lockIcon}
    </div>`;
}

// ── Render: Overview ────────────────────────────────────────────────────────
function renderOverview() {
  const prog = roomsWithProgress();
  const allDone    = prog.every(r => r.total > 0 && r.recorded === r.total);
  const nonStarted = prog.filter(r => r.recorded === 0).length;
  const totalFlags = Object.values(assessments).filter(a => a.flagged).length;

  let bannerClass, bannerText;
  if (allDone && totalFlags === 0) {
    bannerClass = "banner-ok";
    bannerText  = "✓ ALL CLEAR — All rooms complete, no concerns";
  } else if (totalFlags > 0) {
    bannerClass = "banner-alert";
    bannerText  = `⚠ ALERT — ${totalFlags} concern flag(s) raised`;
  } else if (nonStarted === prog.length) {
    bannerClass = "banner-wait";
    bannerText  = "Assessment not yet started";
  } else {
    bannerClass = "banner-wait";
    bannerText  = `Assessment in progress — ${prog.filter(r => r.recorded === r.total && r.total > 0).length}/${prog.length} rooms complete`;
  }

  let html = `<div class="overview-banner ${bannerClass}">${bannerText}</div>`;

  // Room grid
  html += `<div class="overview-grid">`;
  prog.forEach(r => {
    const pct     = r.total ? Math.round(r.recorded / r.total * 100) : 0;
    const fillCls = pct === 100 ? "fill-complete" : pct > 0 ? "fill-partial" : "fill-empty";
    const flags   = Object.entries(assessments).filter(([id, a]) => {
      const room = (candidates[id]&&candidates[id].room) || id.split("_")[0] || "";
      return room.toUpperCase() === r.room && a.flagged;
    }).length;
    html += `
      <div class="ov-room-card" onclick="switchToRoom('${r.room}')">
        <div class="rn">Room ${r.room}</div>
        <div class="rp">${r.recorded}/${r.total} assessed</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill ${fillCls}" style="width:${pct}%;"></div></div>
        ${flags ? `<div class="ov-room-flag">⚑ ${flags} concern(s)</div>` : ""}
      </div>`;
  });
  html += `</div>`;

  // Concerns list
  const flaggedEntries = Object.entries(assessments).filter(([,a]) => a.flagged);
  if (flaggedEntries.length) {
    html += `<div class="concerns-list">
      <h3>⚑ Active concern flags (${flaggedEntries.length})</h3>
      ${flaggedEntries.map(([id, a]) => {
        const cand = candidates[id] || { name: id, stream: "" };
        const room = (cand.room||id.split("_")[0]||"").toUpperCase();
        return `<div class="cl-item">
          <span><strong>${cand.name}</strong> · Room ${room} · ${a.outcome === "pass" ? "Successful" : a.outcome === "fail" ? "Not Successful" : "Pending"}</span>
          <button onclick="switchToRoom('${room}')" style="font-size:12px;padding:5px 10px;background:var(--rmd-navy);color:white;border:none;border-radius:6px;cursor:pointer;font-family:var(--font);">View room</button>
        </div>`;
      }).join("")}
    </div>`;
  } else {
    html += `<div class="concerns-list"><div class="empty-state" style="padding:20px;">No concern flags raised.</div></div>`;
  }

  document.getElementById("mainContent").innerHTML = html;
}

function switchToRoom(room) {
  currentRoom = room;
  switchView("assess");
}

// ── Actions ──────────────────────────────────────────────────────────────────
async function recordOutcome(candidateId, outcome) {
  const label = outcome === "pass" ? "Successful" : "Not Successful";
  try {
    await db.collection("gateway_assessments").doc(candidateId).set({
      outcome,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      assessorUid: auth.currentUser ? auth.currentUser.uid : null
    }, { merge: true });
    showToast(`${candidates[candidateId]?candidates[candidateId].name:candidateId}: ${label}`,
      outcome === "pass" ? "green" : "red");
  } catch (err) {
    showToast("Save failed — check connection", "red");
    console.error(err);
  }
}

async function toggleFlag(candidateId) {
  const current = !!(assessments[candidateId] && assessments[candidateId].flagged);
  try {
    await db.collection("gateway_assessments").doc(candidateId).set(
      { flagged: !current, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
      { merge: true }
    );
    showToast(!current ? "⚑ Concern flag added" : "Flag removed", "amber");
  } catch (err) {
    showToast("Could not update flag", "red");
  }
}

async function lockOutcome(candidateId) {
  try {
    await db.collection("gateway_assessments").doc(candidateId).set(
      { lockedAt: firebase.firestore.FieldValue.serverTimestamp() },
      { merge: true }
    );
    showToast("Outcome locked", "green");
  } catch (err) {
    showToast("Lock failed", "red");
  }
}

function requestUnlock(candidateId) {
  const name = candidates[candidateId] ? candidates[candidateId].name : candidateId;
  if (confirm(`Unlock assessment for ${name}?\n\nThis will allow the outcome to be changed. Tap OK to confirm.`)) {
    unlockPending[candidateId] = true;
    db.collection("gateway_assessments").doc(candidateId).update({ lockedAt: null })
      .then(() => {
        delete unlockPending[candidateId];
        showToast("Unlocked — outcome can now be changed", "amber");
      })
      .catch(err => {
        delete unlockPending[candidateId];
        showToast("Unlock failed", "red");
      });
  }
}

function confirmUnlock(candidateId) {
  delete unlockPending[candidateId];
  renderAssess();
}

// ── Clock & deadline bar ─────────────────────────────────────────────────────
function updateClock() {
  const now  = new Date();
  const h    = now.getHours();
  const m    = now.getMinutes();
  const hPad = String(h).padStart(2,"0");
  const mPad = String(m).padStart(2,"0");
  document.getElementById("clockEl").textContent = `${hPad}:${mPad}`;

  const dlMins  = (DEADLINE_HOUR * 60 + DEADLINE_MIN) - (h * 60 + m);
  const bar     = document.getElementById("deadlineBar");
  if (dlMins <= 0) {
    bar.textContent = "Assessment window closed (11:45)";
    bar.className   = "red";
  } else if (dlMins <= 15) {
    bar.textContent = `⚠ ${dlMins} minute(s) remaining — submit results now`;
    bar.className   = "red";
  } else if (dlMins <= 30) {
    bar.textContent = `⚠ ${dlMins} minutes remaining until 11:45 deadline`;
    bar.className   = "amber";
  } else {
    const hrs = Math.floor(dlMins / 60);
    const min = dlMins % 60;
    const timeStr = hrs > 0 ? `${hrs}h ${min}m` : `${min}m`;
    bar.textContent = `Assessing until 11:45 · ${timeStr} remaining`;
    bar.className   = "";
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
var toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className   = `show ${type}`;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = type; }, 2200);
}

</script>
